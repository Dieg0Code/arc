name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: vet
        run: go vet ./...
      - name: test (race + coverage)
        # En Linux cgo+gcc funcionan, así que el race detector corre acá.
        run: go test -race -coverprofile=coverage.out ./...
