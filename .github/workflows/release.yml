name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # crear la GitHub Release

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # tags + historial para el changelog
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          # GITHUB_TOKEN publica la Release en este repo.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT con scope repo para pushear a scoop-bucket / homebrew-tap
          # (el token por defecto no puede escribir en otros repos).
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
